ir.appendChild(inp);ir.appendChild(h(‘button’,{style:{width:‘46px’,height:‘46px’,borderRadius:‘50%’,background:‘linear-gradient(135deg,#A78BFA,#F472B6)’,border:‘none’,color:’#fff’,fontSize:‘20px’,cursor:‘pointer’,flexShrink:‘0’},onClick:sendGroup},‘↑’));div.appendChild(ir);
}
if(S.gTab===‘deb’){
const debCard=h(‘div’,{className:‘card’,style:{background:‘linear-gradient(135deg,rgba(251,146,60,0.1),transparent)’,border:‘1px solid rgba(251,146,60,0.3)’}});
debCard.appendChild(h(‘p’,{style:{fontSize:‘14px’,fontWeight:‘700’,marginBottom:‘8px’,color:’#F0F9FF’}},‘Demander un debriefing collectif’));
debCard.appendChild(h(‘p’,{style:{fontSize:‘13px’,color:’#CBD5E1’,lineHeight:‘1.65’,marginBottom:‘14px’}},“Signalez a votre cadre qu’un moment collectif serait benefique.”));
if(!S.debReq)debCard.appendChild(h(‘button’,{className:‘btn-primary’,style:{background:‘linear-gradient(135deg,#FB923C,#EA580C)’},onClick:()=>{S.debReq=true;render();}},‘Envoyer la demande’));
else debCard.appendChild(h(‘div’,{style:{background:‘rgba(52,211,153,0.1)’,border:‘1px solid rgba(52,211,153,0.3)’,borderRadius:‘12px’,padding:‘14px’,textAlign:‘center’}},h(‘p’,{style:{fontSize:‘14px’,fontWeight:‘700’,color:’#34D399’}},‘Demande envoyee ✅’)));
div.appendChild(debCard);
}
return div;
}

function sendGroup(){if(!S.gIn.trim())return;S.gMsgs=[…S.gMsgs,{auth:S.anon?‘IDE #’+(Math.floor(Math.random()*9)+1):S.name,txt:S.gIn,time:S.time,req:false}];S.gIn=’’;render();}

setInterval(()=>{const d=new Date();S.time=d.getHours()+’:’+String(d.getMinutes()).padStart(2,‘0’);},30000);
render();
</script>
