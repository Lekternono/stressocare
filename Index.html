{id:1,text:“Niveau de stress pendant cette urgence ?”,type:“scale”,min:“Calme”,max:“Intense”,icon:“🌡”},

“Prends soin de toi, on est là 💙”,
“Courage, tu fais un boulot remarquable 🌟”,
“On traverse ça ensemble 🤝”,
“Ton ressenti est totalement légitime 🙏”,
“Chaque urgence nous apprend quelque chose 💪”,
];

function makeAnalysis(a, sc) {
const f = a[4] || [];
let v = sc >= 70
? “Ce que vous venez de vivre était particulièrement intense. Le ressenti que vous décrivez est tout à fait légitime — cette pression demande énormément sur le plan technique et émotionnel.”
: sc >= 40
? “Vous avez traversé une situation exigeante. Le stress ressenti est une réaction normale et saine, témoignant de votre engagement professionnel.”
: “Vous semblez avoir bien géré cette situation. Votre capacité de régulation émotionnelle est réelle et précieuse dans ce métier.”;
let an = f.includes(3)
? “L’isolement ressort comme facteur central. Selon Edmondson, le sentiment d’être seul face à une décision critique amplifie considérablement la charge émotionnelle.”
: (f.includes(1) && f.includes(5))
? “Le manque d’expérience couplé à la peur de l’erreur évoque le modèle de Benner : vous êtes dans la phase novice-compétent. Chaque situation vécue et debriefée construit votre expertise.”
: (f.includes(4) || (a[3]??0) >= 2)
? “Les difficultés de communication ressortent fortement. Selon Mucchielli, quand la coordination manque, le stress individuel s’intensifie même chez les soignants expérimentés.”
: “Selon Lazarus et Folkman, votre stress s’inscrit dans une réponse adaptative normale. L’équilibre entre sollicitations et ressources se construit avec l’expérience.”;
let tips = [];
if (sc >= 60) tips.push(“Faites un exercice de cohérence cardiaque maintenant — 3 min suffisent”);
if (f.includes(3)) tips.push(“Identifiez 1-2 collègues vers qui vous tourner lors des prochaines urgences”);
if (f.includes(4)||(a[3]??0)>=2) tips.push(“Proposez un debriefing collectif à votre cadre pour cette situation”);
if (!tips.length) tips.push(“Continuez à analyser vos situations — c’est ce qui transforme l’expérience en compétence”);
return v + “\n\n” + an + “\n\n> “ + tips.slice(0,2).join(”\n> “);
}

function makeJournalReply(txt) {
if (/triste|pleur|mort/i.test(txt)) return “La tristesse face à certaines situations n’est pas un défaut professionnel — c’est le signe d’une humanité préservée.\n\nQu’est-ce qui vous a touché le plus dans cette situation ?”;
if (/fatigu|epuis|crev/i.test(txt)) return “Vos mots laissent transparaître une fatigue qui n’est pas que physique. La nommer est déjà un acte de soin envers vous-même.\n\nDe quoi auriez-vous besoin maintenant pour vous ressourcer ?”;
if (/doute|capable|nul/i.test(txt)) return “Le doute que vous exprimez est paradoxalement un signe de conscience professionnelle élevée.\n\nIdentifiez une force que vous avez démontrée aujourd’hui.”;
if (/fier|reussi|content/i.test(txt)) return “Cette satisfaction mérite d’être pleinement accueillie. Ces moments construisent l’efficacité personnelle dont parle Bandura.\n\nComment capitaliser sur ce succès pour la prochaine fois ?”;
return “Mettre des mots sur ce que l’on traverse est précieux. Selon Schön, c’est cette posture de praticien réflexif qui transforme l’expérience en compétence.\n\nQu’est-ce qui, dans cette situation, mérite d’être retenu ?”;
}

function makeChatReply(msg) {
const m = msg.toLowerCase();
if (/bonjour|salut|hello/.test(m)) return “Bonjour ! Comment vous sentez-vous aujourd’hui ?”;
if (/depasse|submerge|trop|bout/.test(m)) return “Je vous entends. Quand on se sent dépassé, il faut d’abord se donner la permission de l’être. Qu’est-ce qui pèse le plus en ce moment ?”;
if (/stress|anxie/.test(m)) return “Le stress fait partie de notre métier, mais sa gestion s’apprend. Qu’est-ce qui vous pèse le plus actuellement ?”;
if (/peur|crainte|angoisse/.test(m)) return “La peur de mal faire est universelle chez les soignants consciencieux. De quoi avez-vous peur précisément ?”;
if (/erreur|trompe|rate/.test(m)) return “Toute erreur analysée devient une opportunité d’apprentissage — c’est ce que Schön appelle la pratique réflexive. Que s’est-il passé ?”;
if (/seul|solitude/.test(m)) return “Le sentiment d’isolement est l’un des facteurs de stress les plus puissants. Avez-vous des collègues vers qui vous tourner ?”;
if (/fatigu|epuis/.test(m)) return “Cette fatigue n’est pas seulement physique. Qu’est-ce qui vous ressource habituellement ?”;
if (/merci|super|genial/.test(m)) return “C’est avec plaisir. N’hésitez pas à revenir quand vous en aurez besoin.”;
if (/au revoir|bye/.test(m)) return “À bientôt. Prenez soin de vous. 💙”;
const r = [“Je vous entends. Pouvez-vous m’en dire un peu plus ?”,“Ce que vous partagez mérite réflexion. Qu’est-ce qui vous touche le plus ?”,“Qu’est-ce qui vous semble le plus difficile à porter en ce moment ?”];
return r[Math.floor(Math.random()*r.length)];
}

function TypeIn({text}) {
const [d,setD]=useState(””); const [done,setDone]=useState(false);
useEffect(()=>{
setD(””); setDone(false); let i=0;
const id=setInterval(()=>{if(i<text.length){setD(text.slice(0,i+1));i++;}else{setDone(true);clearInterval(id);}},13);
return()=>clearInterval(id);
},[text]);
return React.createElement(React.Fragment,null,d,!done&&React.createElement(“span”,{style:{animation:“blink 0.8s infinite”,color:C.blue}},”|”));
}

function BreathOrb({onDone}) {
const [pi,setPi]=useState(0); const [cnt,setCnt]=useState(4);
const [cyc,setCyc]=useState(0); const cr=useRef(0);
const PH=[{label:“Inspirez”,dur:4,col:C.blue,sc:1.4},{label:“Retenez”,dur:4,col:C.purple,sc:1.4},{label:“Expirez”,dur:6,col:C.green,sc:1}];
useEffect(()=>{
let pIdx=0,c=PH[0].dur; setPi(0); setCnt(c);
const id=setInterval(()=>{
c–;
if(c<=0){pIdx++;if(pIdx>=PH.length){pIdx=0;cr.current++;setCyc(cr.current);if(cr.current>=3){clearInterval(id);onDone();return;}}c=PH[pIdx].dur;setPi(pIdx);}
setCnt(c);
},1000);
return()=>clearInterval(id);
},[]);
const p=PH[pi];
return (
<div style={{display:“flex”,flexDirection:“column”,alignItems:“center”,gap:24,padding:“20px 0”}}>
<div style={{display:“flex”,gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:28,height:4,borderRadius:4,background:i<cyc?C.green:i===cyc?p.col:C.textD,transition:“all 0.4s”}}/>)}</div>
<div style={{position:“relative”,width:220,height:220}}>
<div style={{position:“absolute”,inset:-20,borderRadius:“50%”,background:`radial-gradient(circle,${p.col}20 0%,transparent 60%)`,filter:“blur(20px)”,transform:`scale(${p.sc})`,transition:`transform ${p.dur}s ease-in-out`}}/>
<div style={{position:“absolute”,inset:0,borderRadius:“50%”,border:`2px solid ${p.col}80`,transform:`scale(${p.sc})`,transition:`transform ${p.dur}s ease-in-out`}}/>
<div style={{position:“absolute”,inset:28,borderRadius:“50%”,border:`1.5px solid ${p.col}`,transform:`scale(${p.sc})`,transition:`transform ${p.dur}s ease-in-out`,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”}}>
<span style={{fontSize:52,fontWeight:200,color:p.col}}>{cnt}</span>
<span style={{fontSize:11,color:p.col,fontWeight:600,letterSpacing:3,textTransform:“uppercase”}}>{p.label}</span>
</div>
</div>
<p style={{fontSize:12,color:C.textC,textAlign:“center”,lineHeight:1.6}}>Méthode 4-4-6 · Cohérence cardiaque</p>
</div>
);
}

function Ring({score}) {
const col=score<40?C.green:score<70?C.orange:C.red;
const lbl=score<40?“Stress maîtrisé”:score<70?“Stress modéré”:“Stress élevé”;
const [a,setA]=useState(0);
useEffect(()=>{const id=setTimeout(()=>setA(score),150);return()=>clearTimeout(id);},[score]);
const circ=2*Math.PI*75;
return (
<div style={{display:“flex”,flexDirection:“column”,alignItems:“center”,gap:14}}>
<div style={{position:“relative”,width:190,height:190}}>
<svg width=“190” height=“190” style={{transform:“rotate(-90deg)”}}>
<circle cx="95" cy="95" r="75" fill="none" stroke="rgba(56,189,248,0.1)" strokeWidth="10"/>
<circle cx=“95” cy=“95” r=“75” fill=“none” stroke={col} strokeWidth=“10”
strokeDasharray={circ} strokeDashoffset={circ-(a/100)*circ}
strokeLinecap=“round” style={{transition:“stroke-dashoffset 1.8s ease”}}/>
</svg>
<div style={{position:“absolute”,inset:0,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”}}>
<span style={{fontSize:52,fontWeight:200,color:col}}>{Math.round(a)}</span>
<span style={{fontSize:11,color:C.textC,letterSpacing:2,textTransform:“uppercase”}}>sur 100</span>
</div>
</div>
<div style={{background:`${col}18`,border:`1px solid ${col}30`,borderRadius:100,padding:“7px 20px”}}>
<span style={{fontSize:14,fontWeight:600,color:col}}>{lbl}</span>
</div>
</div>
);
}

function Dots({color}) {
return <div style={{display:“flex”,gap:4}}>{[0,0.2,0.4].map(d=><div key={d} style={{width:7,height:7,borderRadius:“50%”,background:color,animation:“pulse 1.2s infinite”,animationDelay:`${d}s`}}/>)}</div>;
}

function Toggle({on,onChange}) {
return (
<button onClick={()=>onChange(!on)} style={{width:40,height:22,borderRadius:100,background:on?C.purple:C.textD,border:“none”,cursor:“pointer”,position:“relative”,transition:“background 0.3s”,flexShrink:0}}>
<div style={{position:“absolute”,top:3,left:on?20:3,width:16,height:16,borderRadius:“50%”,background:”#fff”,transition:“left 0.3s”}}/>
</button>
);
}

const [anim,setAnim]=useState(true);
const [name,setName]=useState(””); const [role,setRole]=useState(“IDE”);
const [nameIn,setNameIn]=useState(””); const [roleIn,setRoleIn]=useState(“IDE”);
const [qi,setQi]=useState(0); const [ans,setAns]=useState({});
const [slid,setSlid]=useState(5); const [score,setScore]=useState(null);
const [aiTxt,setAiTxt]=useState(””); const [aiLoading,setAiLoading]=useState(false);
const [hist,setHist]=useState([
{date:“28 Avr”,sit:“Arrêt cardiaque”,score:58,col:C.orange},
{date:“21 Avr”,sit:“Détresse respiratoire”,score:44,col:C.orange},
{date:“14 Avr”,sit:“Infarctus”,score:29,col:C.green},
]);
const [breathDone,setBreathDone]=useState(false);
const [jMsgs,setJMsgs]=useState([]); const [jIn,setJIn]=useState(””); const [jLoad,setJLoad]=useState(false);
const jEnd=useRef(null);

{id:1,auth:“IDE #4”,txt:“Journée difficile, merci à tous 🙏”,time:“18:42”,req:false},
{id:2,auth:“IDE #2”,txt:“On est là ! Courage 💙”,time:“18:45”,req:false},
]);
const [gIn,setGIn]=useState(””); const [anon,setAnon]=useState(true); const [debReq,setDebReq]=useState(false);
const gEnd=useRef(null);
const [time,setTime]=useState(“9:41”);

useEffect(()=>{
const upd=()=>{const d=new Date();setTime(`${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`);};
upd(); const id=setInterval(upd,30000); return()=>clearInterval(id);
},[]);

useEffect(()=>{cEnd.current?.scrollIntoView({behavior:“smooth”});},[cMsgs,cLoad]);
useEffect(()=>{jEnd.current?.scrollIntoView({behavior:“smooth”});},[jMsgs,jLoad]);
useEffect(()=>{gEnd.current?.scrollIntoView({behavior:“smooth”});},[gMsgs]);

const go=(s)=>{setAnim(false);setTimeout(()=>{setScreen(s);setAnim(true);},200);};
const sc2col=(s)=>s<40?C.green:s<70?C.orange:C.red;
const today=()=>{const d=new Date();return `${d.getDate()} ${["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"][d.getMonth()]}`;};
const delay=(fn,ms)=>new Promise(r=>setTimeout(()=>r(fn()),ms+Math.random()*600));

const compScore=(a)=>{
let s=0;
if(a[1])s+=a[1]*5;
if(a[2]!==undefined)s+=[0,5,10,15][a[2]];
if(a[3]!==undefined)s+=[0,5,10,15][a[3]];
if(a[4])s+=Math.min(a[4].length*3,15);
if(a[5]!==undefined)s+=[5,4,2,1,0][a[5]];
return Math.min(Math.round(s),100);
};

const doAnswer=(val)=>{
const na={…ans,[QS[qi].id]:val};
setAns(na);
if(qi<QS.length-1){setAnim(false);setTimeout(()=>{setQi(qi+1);setSlid(5);setAnim(true);},200);}
else{
const sc=compScore(na);
setScore(sc);
setHist(prev=>[{date:today(),sit:“Urgence vitale”,score:sc,col:sc2col(sc)},…prev].slice(0,5));
go(“score”);
setAiLoading(true);
delay(()=>makeAnalysis(na,sc),2000).then(t=>{setAiTxt(t);setAiLoading(false);});
}
};

const doJournal=async()=>{
if(!jIn.trim()||jLoad)return;
const msg={r:“user”,t:jIn}; const newM=[…jMsgs,msg]; setJMsgs(newM);
const inp=jIn; setJIn(””); setJLoad(true);
const rep=await delay(()=>jMsgs.length===0?makeJournalReply(inp):makeChatReply(inp),1600);
setJMsgs([…newM,{r:“ai”,t:rep}]); setJLoad(false);
};

const doChat=async()=>{
if(!cIn.trim()||cLoad)return;
const msg={r:“user”,t:cIn}; const newM=[…cMsgs,msg]; setCMsgs(newM);
const inp=cIn; setCIn(””); setCLoad(true);
const rep=await delay(()=>makeChatReply(inp),1200);
setCMsgs([…newM,{r:“ai”,t:rep}]); setCLoad(false);
};

const sendGroup=async()=>{
if(!gIn.trim())return;
const msg={id:Date.now(),auth:anon?`IDE #${Math.floor(Math.random()*9)+1}`:name,txt:gIn,time,req:false};
setGMsgs([…gMsgs,msg]); setGIn(””);
};

const requestDebrief=async()=>{
const msg={id:Date.now(),auth:anon?“Un IDE du service”:name,txt:“Demande de débriefing collectif — Des situations difficiles ont été signalées. Un moment d’équipe serait bénéfique.”,time,req:true};
setGMsgs([…gMsgs,msg]); setDebReq(true);
};

const gAvg=gSessions.length?Math.round(gSessions.reduce((s,h)=>s+h.score,0)/gSessions.length):null;
const gHigh=gSessions.filter(s=>s.score>=70).length;
const q=QS[qi];

return (

            <button key={t.id} onClick={()=>setGTab(t.id)} style={{flex:1,padding:"10px 4px",fontSize:12,fontWeight:600,borderRadius:12,border:`1px solid ${gTab===t.id?C.purple:C.border}`,background:gTab===t.id?"rgba(167,139,250,0.2)":"transparent",color:gTab===t.id?C.purple:C.textC,cursor:"pointer"}}>{t.lbl}</button>
          ))}
        </div>
        {gTab==="dash"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {gSessions.length===0?(
              <div style={{...card,textAlign:"center",padding:36}}>
                <p style={{fontSize:36,marginBottom:14}}>📊</p>
                <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucune donnée partagée</p>
                <p style={{fontSize:13,color:C.textC,lineHeight:1.6}}>Après un débriefing, partagez votre score pour alimenter ce tableau.</p>
              </div>
            ):(
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  {[{lbl:"Sessions",val:gSessions.length,col:C.blue},{lbl:"Score moy.",val:`${gAvg}/100`,col:sc2col(gAvg)},{lbl:"Stress élevé",val:gHigh,col:gHigh>0?C.red:C.green}].map((s,i)=>(
                    <div key={i} style={{...card,padding:14,textAlign:"center"}}><p style={{fontSize:22,fontWeight:700,color:s.col,marginBottom:4}}>{s.val}</p><p style={{fontSize:10,color:C.textC,textTransform:"uppercase",letterSpacing:0.5}}>{s.lbl}</p></div>
                  ))}
                </div>
                {gHigh>0&&<div style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:14,padding:"12px 16px"}}><p style={{fontSize:13,color:C.red,fontWeight:600}}>{gHigh} session(s) à stress élevé</p><p style={{fontSize:12,color:C.textB,marginTop:4}}>Un débriefing collectif serait recommandé.</p></div>}
                <button onClick={()=>setGSessions([])} style={{...btnS,fontSize:12}}>Réinitialiser</button>
              </>
            )}
          </div>
        )}
        {gTab==="msgs"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{...card,padding:14,minHeight:240}}>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {gMsgs.filter(m=>!m.req).map((m,i)=>(
                  <div key={i}><p style={{fontSize:10,color:C.textD,marginBottom:4,paddingLeft:4}}>{m.auth} · {m.time}</p><div style={{background:"rgba(167,139,250,0.1)",color:C.textB,padding:"10px 14px",borderRadius:"16px 16px 16px 4px",fontSize:13,lineHeight:1.55,border:"1px solid rgba(167,139,250,0.2)",maxWidth:"86%"}}>{m.txt}</div></div>
                ))}
                <div ref={gEnd}/>
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{SUPPORT.slice(0,3).map(s=><button key={s} onClick={()=>setGIn(s)} style={{fontSize:11,color:C.purple,background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",padding:"6px 12px",borderRadius:100,cursor:"pointer"}}>{s}</button>)}</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}><Toggle on={anon} onChange={setAnon}/><span style={{fontSize:12,color:C.textB}}>Anonyme {anon?"(actif)":"(désactivé)"}</span></div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <input type="text" value={gIn} onChange={e=>setGIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendGroup()} placeholder="Message à l'équipe..." style={{flex:1,background:C.cardSolid,border:"1px solid rgba(167,139,250,0.35)",borderRadius:100,padding:"13px 18px",color:C.text,fontSize:14,outline:"none",fontFamily:"inherit"}}/>
              <button onClick={sendGroup} disabled={!gIn.trim()} style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${C.purple},${C.pink})`,border:"none",color:"#fff",fontSize:20,cursor:"pointer",opacity:!gIn.trim()?0.5:1}}>↑</button>
            </div>
          </div>
        )}
        {gTab==="deb"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{...card,background:"linear-gradient(135deg,rgba(251,146,60,0.1),transparent)",border:"1px solid rgba(251,146,60,0.3)"}}>
              <p style={{fontSize:14,fontWeight:700,marginBottom:8}}>Demander un débriefing collectif</p>
              <p style={{fontSize:13,color:C.textB,lineHeight:1.65,marginBottom:14}}>Signalez à votre cadre qu'un moment collectif serait bénéfique.</p>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><Toggle on={anon} onChange={setAnon}/><span style={{fontSize:12,color:C.textB}}>Anonyme {anon?"(actif)":"(désactivé)"}</span></div>
              {!debReq?(
                <button onClick={requestDebrief} style={{...btnP,background:`linear-gradient(135deg,${C.orange},#EA580C)`}}>Envoyer la demande</button>
              ):(
                <div style={{background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.3)",borderRadius:12,padding:"14px 18px",textAlign:"center"}}>
                  <p style={{fontSize:14,fontWeight:700,color:C.green}}>Demande envoyée ✅</p>
                  <p style={{fontSize:12,color:C.textB,marginTop:6}}>Votre cadre a été notifié dans l'espace messages.</p>
                </div>
              )}
            </div>
            <div style={{...card,background:"linear-gradient(135deg,rgba(56,189,248,0.06),transparent)",border:`1px solid ${C.border}`}}>
              <p style={{fontSize:13,fontWeight:700,color:C.blue,marginBottom:8}}>Pourquoi un débriefing collectif ?</p>
              <p style={{fontSize:12,color:C.textB,lineHeight:1.75}}>Selon Edmondson, la sécurité psychologique d'équipe se construit dans ces espaces de parole partagée. Un débriefing après une urgence difficile réduit le stress résiduel et renforce la cohésion.</p>
            </div>
          </div>
        )}
      </div>
    )}

  </div>

  {screen!=="login"&&(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(2,6,23,0.95)",backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,paddingBottom:"env(safe-area-inset-bottom)"}}>
      <div style={{display:"flex",maxWidth:480,margin:"0 auto"}}>
        {[
          {icon:"🏠",lbl:"Accueil",scr:"home"},
          {icon:"📋",lbl:"Débrief",scr:"debrief"},
          {icon:"💬",lbl:"Coach",scr:"chat"},
          {icon:"👥",lbl:"Équipe",scr:"group"},
          {icon:"📊",lbl:"Historique",scr:"history"},
        ].map(it=>(
          <button key={it.scr} onClick={()=>{if(it.scr==="debrief"){setQi(0);setAns({});setAiTxt("");setScore(null);}go(it.scr);}} style={{flex:1,padding:"10px 0",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:20}}>{it.icon}</span>
            <span style={{fontSize:9,color:screen===it.scr?C.blue:C.textC,fontWeight:screen===it.scr?700:400,transition:"color 0.2s"}}>{it.lbl}</span>
            {screen===it.scr&&<div style={{width:4,height:4,borderRadius:"50%",background:C.blue}}/>}
          </button>
        ))}
      </div>
    </div>
  )}
</div>
